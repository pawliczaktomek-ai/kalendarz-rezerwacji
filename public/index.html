<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Centrum Szkolenia Piłkarza – Rezerwacje treningów</title>

  <!-- FullCalendar -->
  <link  href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js"></script>
  <!-- FullCalendar Polish locale -->
  <script src="https://cdn.jsdelivr.net/npm/@fullcalendar/core@6.1.10/locales/pl.global.min.js"></script>

  <style>
    :root {
      --green:  #27ae60;
      --red:    #e74c3c;
      --blue:   #2980b9;
      --dark:   #1a1a2e;
      --mid:    #16213e;
      --card:   #0f3460;
      --accent: #e94560;
      --text:   #eaeaea;
      --muted:  #a0aec0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--dark);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Header ─────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, var(--mid), var(--card));
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: .8rem; }
    .logo span { font-size: 2.2rem; }
    .logo h1 { font-size: 1.3rem; line-height: 1.2; }
    .logo h1 small { display: block; font-size: .75rem; color: var(--muted); font-weight: 400; }

    .header-btns { display: flex; gap: .6rem; }
    .btn {
      padding: .5rem 1.1rem;
      border: none; border-radius: 8px;
      cursor: pointer; font-size: .9rem; font-weight: 600;
      transition: all .2s;
    }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-red    { background: var(--red);    color: #fff; }
    .btn-blue   { background: var(--blue);   color: #fff; }
    .btn-gray   { background: #444;          color: #fff; }
    .btn:hover  { opacity: .85; transform: translateY(-1px); }

    /* ── Main ───────────────────────────────────────── */
    main { padding: 1.5rem 2rem; max-width: 1200px; margin: 0 auto; }

    .legend {
      display: flex; gap: 1.2rem; margin-bottom: 1rem;
      flex-wrap: wrap; align-items: center;
    }
    .legend-item { display: flex; align-items: center; gap: .4rem; font-size: .85rem; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }

    /* FullCalendar overrides */
    #calendar {
      background: var(--mid);
      border-radius: 12px;
      padding: 1rem;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
    }
    .fc { color: var(--text) !important; }
    .fc-toolbar-title { color: var(--text) !important; font-size: 1.2rem !important; }
    .fc-button { background: var(--card) !important; border-color: #444 !important; color: var(--text) !important; }
    .fc-button:hover { background: var(--blue) !important; border-color: var(--blue) !important; }
    .fc-button-active { background: var(--blue) !important; border-color: var(--blue) !important; }
    .fc-col-header-cell { background: var(--card) !important; }
    .fc-timegrid-slot { border-color: #2a2a4a !important; }
    .fc-day-today { background: rgba(41,128,185,.15) !important; }
    .fc-daygrid-day:hover, .fc-timegrid-slot:hover { background: rgba(255,255,255,.04) !important; }
    .fc-event { cursor: pointer; border-radius: 6px !important; border: none !important; }
    .fc-event:hover { opacity: .88; }
    .fc-scrollgrid { border-color: #2a2a4a !important; }
    .fc-scrollgrid td, .fc-scrollgrid th { border-color: #2a2a4a !important; }
    .fc-timegrid-axis { color: var(--muted) !important; }
    .fc-col-header-cell-cushion { color: var(--text) !important; }
    .fc-daygrid-day-number { color: var(--muted) !important; }

    /* ── Modals ─────────────────────────────────────── */
    .modal-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 1000;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--mid);
      border: 1px solid #2a2a4a;
      border-radius: 16px;
      padding: 2rem;
      width: 100%; max-width: 480px;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .modal h2 { font-size: 1.3rem; margin-bottom: 1.2rem; display: flex; align-items: center; gap: .5rem; }
    .modal-slot-info {
      background: rgba(39,174,96,.15);
      border: 1px solid rgba(39,174,96,.3);
      border-radius: 8px;
      padding: .7rem 1rem;
      margin-bottom: 1.2rem;
      font-size: .9rem;
    }
    .form-group { margin-bottom: 1rem; }
    .form-group label { display: block; margin-bottom: .3rem; font-size: .85rem; color: var(--muted); }
    .form-group input, .form-group textarea {
      width: 100%;
      background: rgba(255,255,255,.07);
      border: 1px solid #3a3a5a;
      border-radius: 8px;
      padding: .6rem .9rem;
      color: var(--text);
      font-size: .95rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--blue); }
    .form-group textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: .7rem; margin-top: 1.3rem; }
    .modal-actions .btn { flex: 1; padding: .7rem; font-size: 1rem; }

    /* ── Toast ──────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 2rem; right: 2rem;
      background: var(--green); color: #fff;
      padding: .9rem 1.5rem; border-radius: 10px;
      font-weight: 600; font-size: .95rem;
      box-shadow: 0 4px 20px rgba(0,0,0,.4);
      transform: translateY(100px); opacity: 0;
      transition: all .3s; z-index: 9999;
      max-width: 340px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.error { background: var(--red); }

    /* ── Admin modal ────────────────────────────────── */
    #adminPanel .modal { max-width: 680px; max-height: 90vh; overflow-y: auto; }
    .admin-tabs { display: flex; gap: .5rem; margin-bottom: 1.2rem; }
    .tab-btn {
      padding: .4rem 1rem; border-radius: 6px; border: 1px solid #3a3a5a;
      background: transparent; color: var(--muted); cursor: pointer; font-size: .85rem;
      transition: all .2s;
    }
    .tab-btn.active { background: var(--blue); color: #fff; border-color: var(--blue); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    .slot-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: .6rem .8rem; border-radius: 8px; margin-bottom: .4rem;
      background: rgba(255,255,255,.05); font-size: .85rem; gap: .5rem;
    }
    .slot-row span { flex: 1; }
    .slot-row .badge {
      padding: .2rem .6rem; border-radius: 20px; font-size: .75rem; font-weight: 600;
    }
    .badge-free   { background: rgba(39,174,96,.2);  color: #2ecc71; }
    .badge-booked { background: rgba(231,76,60,.2);  color: #e74c3c; }

    .booking-card {
      background: rgba(255,255,255,.05); border-radius: 8px;
      padding: .8rem 1rem; margin-bottom: .6rem; font-size: .85rem;
    }
    .booking-card strong { color: var(--text); }
    .booking-card .bc-date { color: var(--muted); font-size: .8rem; margin-top: .2rem; }
    .booking-card .bc-phone { color: #5dade2; }

    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
    .checkbox-label { display: flex; align-items: center; gap: .4rem; cursor: pointer; font-size: .9rem; color: var(--muted); }
    .checkbox-label input { accent-color: var(--blue); }

    /* ── Responsive ─────────────────────────────────── */
    @media (max-width: 640px) {
      header { padding: .8rem 1rem; }
      main { padding: 1rem; }
      .logo h1 { font-size: 1rem; }
      .grid2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- ══ Header ══════════════════════════════════════════════════════════ -->
<header>
  <div class="logo">
    <span>⚽</span>
    <h1>Centrum Szkolenia Piłkarza<small>Rezerwacje treningów indywidualnych</small></h1>
  </div>
  <div class="header-btns">
    <button class="btn btn-blue" onclick="openAdminLogin()">🔑 Panel trenera</button>
  </div>
</header>

<!-- ══ Main ════════════════════════════════════════════════════════════ -->
<main>
  <div class="legend">
    <div class="legend-item"><div class="dot" style="background:var(--green)"></div> Wolny termin – kliknij, by zarezerwować</div>
    <div class="legend-item"><div class="dot" style="background:var(--red)"></div> Zajęty</div>
  </div>
  <div id="calendar"></div>
</main>

<!-- ══ Modal rezerwacji ═════════════════════════════════════════════════ -->
<div class="modal-overlay" id="bookModal">
  <div class="modal">
    <h2>📅 Zarezerwuj trening</h2>
    <div class="modal-slot-info" id="slotInfo">–</div>
    <div class="form-group">
      <label>Imię i nazwisko *</label>
      <input id="playerName" type="text" placeholder="np. Jan Kowalski" autocomplete="name"/>
    </div>
    <div class="form-group">
      <label>Numer telefonu * <span style="color:var(--muted);font-size:.8rem">(SMS z potwierdzeniem)</span></label>
      <input id="playerPhone" type="tel" placeholder="np. 600 123 456" autocomplete="tel"/>
    </div>
    <div class="form-group">
      <label>Uwagi (opcjonalnie)</label>
      <textarea id="playerNotes" placeholder="np. praca nad strzałami, pierwsze zajęcia…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray"  onclick="closeModal('bookModal')">Anuluj</button>
      <button class="btn btn-green" onclick="submitBooking()">✅ Potwierdź rezerwację</button>
    </div>
  </div>
</div>

<!-- ══ Modal logowania admina ══════════════════════════════════════════ -->
<div class="modal-overlay" id="loginModal">
  <div class="modal" style="max-width:360px">
    <h2>🔑 Logowanie trenera</h2>
    <div class="form-group">
      <label>Hasło administratora</label>
      <input id="adminPwd" type="password" placeholder="Hasło…" onkeydown="if(event.key==='Enter')loginAdmin()"/>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray"  onclick="closeModal('loginModal')">Anuluj</button>
      <button class="btn btn-blue"  onclick="loginAdmin()">Zaloguj</button>
    </div>
  </div>
</div>

<!-- ══ Panel admina ════════════════════════════════════════════════════ -->
<div class="modal-overlay" id="adminPanel">
  <div class="modal" style="max-width:720px">
    <h2>⚙️ Panel trenera</h2>

    <div class="admin-tabs">
      <button class="tab-btn active" onclick="showTab('tabSlots')">📆 Terminy</button>
      <button class="tab-btn"        onclick="showTab('tabAdd')">➕ Dodaj termin</button>
      <button class="tab-btn"        onclick="showTab('tabBulk')">🗓️ Harmonogram</button>
      <button class="tab-btn"        onclick="showTab('tabBookings')">📋 Rezerwacje</button>
    </div>

    <!-- Lista slotów -->
    <div class="tab-content active" id="tabSlots">
      <button class="btn btn-blue" style="margin-bottom:.8rem;font-size:.8rem" onclick="loadAdminSlots()">🔄 Odśwież</button>
      <div id="adminSlotsList"><em style="color:var(--muted)">Ładowanie…</em></div>
    </div>

    <!-- Dodaj pojedynczy slot -->
    <div class="tab-content" id="tabAdd">
      <div class="grid2">
        <div class="form-group">
          <label>Początek *</label>
          <input type="datetime-local" id="addStart"/>
        </div>
        <div class="form-group">
          <label>Koniec *</label>
          <input type="datetime-local" id="addEnd"/>
        </div>
      </div>
      <div class="form-group" style="display:flex;align-items:center;gap:.8rem">
        <label class="checkbox-label">
          <input type="checkbox" id="addRepeat" onchange="document.getElementById('repeatRow').style.display=this.checked?'block':'none'"/>
          Powtarzaj co tydzień
        </label>
      </div>
      <div id="repeatRow" style="display:none" class="form-group">
        <label>Liczba tygodni</label>
        <input type="number" id="repeatWeeks" value="4" min="2" max="52"/>
      </div>
      <button class="btn btn-green" onclick="addSlot()">➕ Dodaj termin</button>
    </div>

    <!-- Harmonogram tygodniowy -->
    <div class="tab-content" id="tabBulk">
      <p style="font-size:.85rem;color:var(--muted);margin-bottom:.8rem">Wygeneruj wolne terminy na kilka tygodni na podstawie szablonu.</p>
      <div class="grid2">
        <div class="form-group">
          <label>Liczba tygodni</label>
          <input type="number" id="bulkWeeks" value="4" min="1" max="52"/>
        </div>
        <div class="form-group">
          <label>Czas trwania (min)</label>
          <input type="number" id="bulkDuration" value="60" min="30" step="15"/>
        </div>
      </div>
      <div id="bulkDays">
        <!-- Dni i godziny -->
        <p style="font-size:.85rem;margin-bottom:.5rem;color:var(--muted)">Wybierz dni i godziny zajęć:</p>
        <div id="bulkSlotRows"></div>
        <button class="btn btn-gray" style="font-size:.8rem;margin-top:.5rem" onclick="addBulkRow()">+ Dodaj wiersz</button>
      </div>
      <button class="btn btn-green" style="margin-top:.8rem" onclick="submitBulk()">🗓️ Generuj terminy</button>
    </div>

    <!-- Lista rezerwacji -->
    <div class="tab-content" id="tabBookings">
      <button class="btn btn-blue" style="margin-bottom:.8rem;font-size:.8rem" onclick="loadAdminBookings()">🔄 Odśwież</button>
      <div id="adminBookingsList"><em style="color:var(--muted)">Ładowanie…</em></div>
    </div>

    <div style="margin-top:1.2rem;display:flex;justify-content:flex-end">
      <button class="btn btn-gray" onclick="closeModal('adminPanel');adminPassword=null">Zamknij</button>
    </div>
  </div>
</div>

<!-- ══ Toast ════════════════════════════════════════════════════════════ -->
<div id="toast"></div>

<!-- ══ Script ══════════════════════════════════════════════════════════ -->
<script>
  // ── Stan ──────────────────────────────────────────────────────────────
  let calendar;
  let selectedSlotId = null;
  let adminPassword  = null;

  const DAY_NAMES = ['', 'Pon', 'Wt', 'Śr', 'Czw', 'Pt', 'Sob', 'Nd'];

  // ── Toast ─────────────────────────────────────────────────────────────
  function toast(msg, type = 'ok') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = 'show' + (type === 'error' ? ' error' : '');
    setTimeout(() => { el.className = ''; }, 4000);
  }

  // ── Modals ────────────────────────────────────────────────────────────
  function openModal(id)  { document.getElementById(id).classList.add('open');    }
  function closeModal(id) { document.getElementById(id).classList.remove('open'); }

  document.querySelectorAll('.modal-overlay').forEach(overlay => {
    overlay.addEventListener('click', e => {
      if (e.target === overlay) overlay.classList.remove('open');
    });
  });

  // ── Tabs ──────────────────────────────────────────────────────────────
  function showTab(id) {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.target.classList.add('active');
    if (id === 'tabSlots')    loadAdminSlots();
    if (id === 'tabBookings') loadAdminBookings();
  }

  // ── Formatowanie daty ─────────────────────────────────────────────────
  function fmt(iso) {
    return new Date(iso).toLocaleString('pl-PL', {
      weekday: 'long', day: 'numeric', month: 'long',
      hour: '2-digit', minute: '2-digit',
    });
  }

  // ── Kalendarz ─────────────────────────────────────────────────────────
  async function loadCalendar() {
    const el = document.getElementById('calendar');
    calendar = new FullCalendar.Calendar(el, {
      locale: 'pl',
      initialView: window.innerWidth < 640 ? 'listWeek' : 'timeGridWeek',
      headerToolbar: {
        left:   'prev,next today',
        center: 'title',
        right:  'dayGridMonth,timeGridWeek,timeGridDay,listWeek',
      },
      slotMinTime: '07:00:00',
      slotMaxTime: '22:00:00',
      slotDuration: '00:30:00',
      height: 'auto',
      nowIndicator: true,
      events: '/api/slots',
      eventClick: info => {
        if (!info.event.extendedProps.booked) {
          openBookModal(info.event.id, info.event.start, info.event.end);
        } else {
          toast('Ten termin jest już zajęty.', 'error');
        }
      },
      eventDidMount: info => {
        info.el.title = info.event.extendedProps.booked ? 'Termin zajęty' : 'Kliknij, by zarezerwować';
      },
    });
    calendar.render();
  }

  // ── Rezerwacja ────────────────────────────────────────────────────────
  function openBookModal(slotId, start, end) {
    selectedSlotId = slotId;
    document.getElementById('slotInfo').textContent = `📅 ${fmt(start)} – ${new Date(end).toLocaleTimeString('pl-PL', { hour: '2-digit', minute: '2-digit' })}`;
    document.getElementById('playerName').value  = '';
    document.getElementById('playerPhone').value = '';
    document.getElementById('playerNotes').value = '';
    openModal('bookModal');
  }

  async function submitBooking() {
    const playerName = document.getElementById('playerName').value.trim();
    const phone      = document.getElementById('playerPhone').value.trim();
    const notes      = document.getElementById('playerNotes').value.trim();

    if (!playerName || !phone) { toast('Wypełnij imię i telefon!', 'error'); return; }

    try {
      const r = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ slotId: selectedSlotId, playerName, phone, notes }),
      });
      const data = await r.json();
      if (!r.ok) throw new Error(data.error || 'Błąd rezerwacji');
      closeModal('bookModal');
      toast(`🎉 ${data.message}`);
      calendar.refetchEvents();
    } catch (e) {
      toast(e.message, 'error');
    }
  }

  // ── Admin – logowanie ─────────────────────────────────────────────────
  function openAdminLogin() { openModal('loginModal'); document.getElementById('adminPwd').value = ''; }

  async function loginAdmin() {
    const pwd = document.getElementById('adminPwd').value;
    // Test hasła przez żądanie listy rezerwacji
    const r = await fetch(`/api/bookings?adminPassword=${encodeURIComponent(pwd)}`);
    if (r.ok) {
      adminPassword = pwd;
      closeModal('loginModal');
      initBulkRows();
      loadAdminSlots();
      openModal('adminPanel');
    } else {
      toast('Błędne hasło!', 'error');
    }
  }

  // ── Admin – sloty ─────────────────────────────────────────────────────
  async function loadAdminSlots() {
    if (!adminPassword) return;
    const r    = await fetch('/api/slots');
    const slots = await r.json();
    const el   = document.getElementById('adminSlotsList');

    if (!slots.length) { el.innerHTML = '<em style="color:var(--muted)">Brak terminów.</em>'; return; }

    // Sortuj wg daty
    slots.sort((a, b) => new Date(a.start) - new Date(b.start));

    el.innerHTML = slots.map(s => `
      <div class="slot-row">
        <span>${fmt(s.start)}</span>
        <span class="badge ${s.booked ? 'badge-booked' : 'badge-free'}">${s.booked ? 'Zajęty' : 'Wolny'}</span>
        <button class="btn btn-red" style="font-size:.75rem;padding:.3rem .7rem"
          onclick="deleteSlot('${s.id}')">🗑</button>
      </div>
    `).join('');
  }

  async function addSlot() {
    const start = document.getElementById('addStart').value;
    const end   = document.getElementById('addEnd').value;
    const repeat = document.getElementById('addRepeat').checked;
    const repeatWeeks = parseInt(document.getElementById('repeatWeeks').value) || 4;

    if (!start || !end) { toast('Podaj datę i godzinę!', 'error'); return; }

    const r = await fetch('/api/slots', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword, start: new Date(start).toISOString(), end: new Date(end).toISOString(), repeat, repeatWeeks }),
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast(`✅ Dodano ${d.slots.length} termin(y)`);
    calendar.refetchEvents();
    loadAdminSlots();
  }

  async function deleteSlot(id) {
    if (!confirm('Usunąć termin?')) return;
    const r = await fetch(`/api/slots/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword }),
    });
    if (r.ok) { toast('Termin usunięty'); calendar.refetchEvents(); loadAdminSlots(); }
    else { const d = await r.json(); toast(d.error, 'error'); }
  }

  // ── Admin – harmonogram ───────────────────────────────────────────────
  function initBulkRows() {
    document.getElementById('bulkSlotRows').innerHTML = '';
    addBulkRow(1, '09:00');
    addBulkRow(3, '15:00');
    addBulkRow(5, '10:00');
  }

  function addBulkRow(day = 1, time = '10:00') {
    const div = document.createElement('div');
    div.style.cssText = 'display:flex;gap:.6rem;align-items:center;margin-bottom:.4rem';
    div.innerHTML = `
      <select style="background:rgba(255,255,255,.07);border:1px solid #3a3a5a;border-radius:6px;padding:.4rem;color:var(--text);flex:1">
        ${[1,2,3,4,5,6,7].map(d => `<option value="${d}" ${d===day?'selected':''}>${DAY_NAMES[d]}</option>`).join('')}
      </select>
      <input type="time" value="${time}" style="background:rgba(255,255,255,.07);border:1px solid #3a3a5a;border-radius:6px;padding:.4rem;color:var(--text);flex:1"/>
      <button onclick="this.parentElement.remove()" style="background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer">✕</button>
    `;
    document.getElementById('bulkSlotRows').appendChild(div);
  }

  async function submitBulk() {
    const weeks    = parseInt(document.getElementById('bulkWeeks').value) || 4;
    const duration = parseInt(document.getElementById('bulkDuration').value) || 60;
    const rows     = document.querySelectorAll('#bulkSlotRows > div');
    const schedule = [];
    rows.forEach(row => {
      const day  = parseInt(row.querySelector('select').value);
      const time = row.querySelector('input[type=time]').value;
      const [h, m] = time.split(':').map(Number);
      schedule.push({ day, hour: h, minute: m, durationMin: duration });
    });
    if (!schedule.length) { toast('Dodaj co najmniej jeden wiersz!', 'error'); return; }

    const r = await fetch('/api/slots/bulk', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword, weeks, schedule }),
    });
    const d = await r.json();
    if (!r.ok) { toast(d.error, 'error'); return; }
    toast(`🗓️ Wygenerowano ${d.count} terminów!`);
    calendar.refetchEvents();
    loadAdminSlots();
  }

  // ── Admin – rezerwacje ────────────────────────────────────────────────
  async function loadAdminBookings() {
    if (!adminPassword) return;
    const r = await fetch(`/api/bookings?adminPassword=${encodeURIComponent(adminPassword)}`);
    const bookings = await r.json();
    const el = document.getElementById('adminBookingsList');

    if (!bookings.length) { el.innerHTML = '<em style="color:var(--muted)">Brak rezerwacji.</em>'; return; }

    bookings.sort((a, b) => new Date(a.slot?.start || 0) - new Date(b.slot?.start || 0));

    el.innerHTML = bookings.map(b => `
      <div class="booking-card">
        <strong>⚽ ${b.playerName}</strong>
        <div class="bc-phone">📞 ${b.phone}</div>
        <div class="bc-date">📅 ${b.slot ? fmt(b.slot.start) : '–'}</div>
        ${b.notes ? `<div style="color:var(--muted);font-size:.8rem;margin-top:.2rem">💬 ${b.notes}</div>` : ''}
        <button class="btn btn-red" style="font-size:.75rem;padding:.3rem .8rem;margin-top:.5rem"
          onclick="cancelBooking('${b.id}','${b.playerName}')">❌ Anuluj rezerwację</button>
      </div>
    `).join('');
  }

  async function cancelBooking(id, name) {
    if (!confirm(`Anulować rezerwację zawodnika ${name}?`)) return;
    const r = await fetch(`/api/bookings/${id}`, {
      method: 'DELETE',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ adminPassword }),
    });
    if (r.ok) { toast('Rezerwacja anulowana'); calendar.refetchEvents(); loadAdminBookings(); }
    else { const d = await r.json(); toast(d.error, 'error'); }
  }

  // ── Init ──────────────────────────────────────────────────────────────
  loadCalendar();
</script>
</body>
</html>
